<!-- Footer -->
<footer class="w-full border-t border-slate-200 dark:border-slate-800 py-8 px-4 mt-auto">
    <div class="max-w-[1200px] mx-auto flex flex-col md:flex-row items-center justify-between gap-4 text-slate-500 dark:text-slate-400 text-sm">
        <div class="flex items-center gap-2 font-medium text-slate-700 dark:text-slate-300">
            <span class="material-symbols-outlined text-primary text-xl">code</span>
            <span>{{ .Site.Title }}</span>
        </div>
        <p>&copy; {{ now.Format "2006" }} {{ .Site.Params.author }}. All rights reserved.</p>
        <div class="flex gap-6">
            {{ range .Site.Menus.footer }}
                <a class="hover:text-primary transition-colors" href="{{ .URL | relLangURL }}">{{ .Name }}</a>
            {{ end }}
        </div>
    </div>
</footer>

<!-- Functional Scripts -->
{{ if (fileExists "assets/js/copy-code.js") }}
{{ $copyJs := resources.Get "js/copy-code.js" | minify | fingerprint }}
<script src="{{ $copyJs.RelPermalink }}" integrity="{{ $copyJs.Data.Integrity }}" defer></script>
{{ end }}
