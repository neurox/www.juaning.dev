{{ define "main" }}
<div class="index-content">
  {{ .Content }}
</div>

<h1 class="font-display text-3xl md:text-4xl font-bold mb-8 text-slate-100">{{ i18n .Title }}</h1>
<ul class="terms">
  {{ range .Data.Terms }}
  {{ $postsNum := len (where .Pages "Params.hidden" "!=" true) }}
  {{ if gt $postsNum 0 }}
  <li>
    <a href={{ .Page.RelPermalink }}>{{ .Page.Title }}</a>
    ({{ $postsNum }})
  </li>
  {{ end}}
  {{ end }}
</ul>
{{ end }}
