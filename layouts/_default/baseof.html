<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}" class="dark">

<head>
    {{ partial "head.html" . }}
    {{ block "head" . }}{{ end }}
</head>

<body class="min-h-screen font-sans selection:bg-cyan-500/30 selection:text-cyan-200 bg-hud-bg">
    {{ partial "header.html" . }}

    <main class="w-full max-w-7xl mx-auto px-6 md:px-8 pt-[105px] pb-0 md:pt-[121px] md:pb-0 flex flex-col gap-8 md:gap-12">
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
</body>

</html>
